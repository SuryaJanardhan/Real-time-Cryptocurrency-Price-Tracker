version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptostream-quantum-app
    ports:
      - "8080:80"
    restart: always
    environment:
      - VITE_REST_API_URL=https://api.coingecko.com/api/v3
      - VITE_WS_API_URL=wss://stream.binance.com:9443/ws/!miniTicker@arr
